# Define the name of this GitHub Action workflow
name: Build and Push to Docker Hub

# Trigger conditions - when this workflow should run
on:
  push: # Run on every push
    branches: # Specify which branches trigger this workflow
      - master # Trigger on push to 'main' branch

# Define the jobs that will be executed by this workflow
jobs:
  build-and-push: # Name of the job
    runs-on: ubuntu-latest # Use a Ubuntu virtual machine to run the job

    # Define the steps to execute in sequence
    steps:
      # Step 1: Download your code from the repository
      - name: Checkout code
        uses: actions/checkout@v4 # Use the official checkout action (version 4)

      # Step 2: Set up Docker Buildx (tool for building Docker images)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Use official Docker buildx setup action (version 3)

      # Step 3: Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3 # Use official Docker login action (version 3)
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # Your Docker Hub username (stored as a secret for security)
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Your Docker Hub access token (stored as a secret for security)

      # Step 4: Build the Docker image and push it to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5 # Use official Docker build-push action (version 5)
        with:
          context: . # Use current directory as the build context (where Dockerfile is located)
          push: true # Push the image to Docker Hub after building
          tags: | # Assign tags/labels to the Docker image
            jguimeradev/ttt-app:v1
            jguimeradev/ttt-app:${{ github.sha }}
